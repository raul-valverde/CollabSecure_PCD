<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Trello - Proyecto Colaborativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="container">
        <h2> Acceso Seguro al Sistema</h2>
        <p class="subtitle">Ingrese sus credenciales para gestionar el tablero.</p>

        <div class="login-form">
            <input type="text" id="username" placeholder="Usuario (admin)">
            <input type="password" id="password" placeholder="Contraseña (1234)">

            <div class="privacy-check">
                <input type="checkbox" id="privacy-policy">
                <label for="privacy-policy">
                    He leído y acepto la <a href="#" onclick="alert('Política: Sus datos se guardan localmente y no se comparten con terceros.')">Política de Privacidad</a> y uso ético de datos.
                </label>
            </div>

            <button onclick="login()" class="btn-primary">Ingresar</button>

            <p id="error-msg" class="error"></p>
        </div>
    </div>

    <div id="app-screen" class="container hidden">
        <header class="header-bar">
            <h1> Tablero de Equipo</h1>
            <div style="display:flex;gap:10px;align-items:center;">
                <button onclick="logout()" class="logout-btn">Cerrar Sesión</button>
            </div>
        </header>

        <section style="margin-top:14px;">
            <div class="input-group">
                <input type="text" id="new-task" placeholder="Escribir una nueva nota...">
                <button class="btn-add" onclick="addTask()">Agregar</button>
            </div>
        </section>

        <main class="board" aria-label="Tablero de tareas">
            <div class="column">
                <h3>Pendientes <span class="col-badge">Nuevo</span></h3>
                <div class="task-list" id="list-pendientes"></div>
            </div>

            <div class="column">
                <h3>En Proceso</h3>
                <div class="task-list" id="list-enproceso"></div>
            </div>

            <div class="column">
                <h3>En Revisión</h3>
                <div class="task-list" id="list-enrevision"></div>
            </div>

            <div class="column">
                <h3>Hecho</h3>
                <div class="task-list" id="list-hecho"></div>
            </div>
        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
