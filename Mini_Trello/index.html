<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini Trello - Envíos</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>Mini Trello - Gestión de Pedidos</h1>
    </header>

    <main class="container">
        <section class="form-section">
            <label for="pedidoInput">Número de pedido</label>
            <input id="pedidoInput" type="text" placeholder="Ej: 12345" />

            <label class="chk">
                <input id="prioritarioChk" type="checkbox" />
                Registrar como PRIORITARIO
            </label>

            <div class="buttons">
                <button id="agregarBtn">Agregar</button>
                <button id="despacharBtn">Despachar</button>
            </div>

            <div class="info">
                <span>Siguiente en salir (prioritario): <strong id="siguientePrioritario">—</strong></span>
                <span>Siguiente en salir (regular): <strong id="siguienteRegular">—</strong></span>
            </div>
        </section>

        <section class="lists-section">
            <div class="list-card">
                <h2>Prioritarios (Pila)</h2>
                <ul id="listaPrioritario" class="list"></ul>
            </div>

            <div class="list-card">
                <h2>Regulares (Cola)</h2>
                <ul id="listaRegular" class="list"></ul>
            </div>
        </section>
    </main>

    <footer>
        <small>Mini_Trello — integrando pila y cola</small>
    </footer>

    <script src="app.js"></script>
</body>
</html>
